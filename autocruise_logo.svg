<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
	<defs>
		<linearGradient id="sphereGrad" x1="210" y1="150" x2="820" y2="900" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#F5F8FF"/>
			<stop offset="0.52" stop-color="#B0B9C8"/>
			<stop offset="1" stop-color="#1A2232"/>
		</linearGradient>
		<radialGradient id="upperGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(370 300) rotate(35) scale(290 230)">
			<stop offset="0" stop-color="#FFFFFF" stop-opacity="0.40"/>
			<stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
		</radialGradient>
		<linearGradient id="bandGrad" x1="136" y1="454" x2="903" y2="600" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#172033"/>
			<stop offset="0.45" stop-color="#0B1120"/>
			<stop offset="1" stop-color="#25334B"/>
		</linearGradient>
		<linearGradient id="lowerGrad" x1="512" y1="645" x2="512" y2="905" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#000000" stop-opacity="0"/>
			<stop offset="1" stop-color="#08101F" stop-opacity="0.68"/>
		</linearGradient>
		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.22"/>
		</filter>
		<clipPath id="clipSphere">
			<circle cx="512" cy="512" r="384"/>
		</clipPath>
	</defs>

	<g filter="url(#softShadow)">
		<circle cx="512" cy="512" r="384" fill="url(#sphereGrad)"/>
		<g clip-path="url(#clipSphere)">
			<circle cx="356" cy="314" r="170" fill="#FFFFFF" fill-opacity="0.18"/>
			<ellipse cx="386" cy="336" rx="250" ry="186" fill="url(#upperGlow)"/>

			<path d="M128 460
				C248 406 414 444 565 494
				C681 531 799 530 896 444
				L896 566
				C770 628 618 628 484 586
				C343 542 223 538 128 598
				Z" fill="url(#bandGrad)"/>

			<path d="M124 456
				C257 398 423 439 575 491
				C685 528 799 528 902 439"
				stroke="#FFFFFF" stroke-opacity="0.95" stroke-width="28" stroke-linecap="round"/>


			<path d="M124 706
				C247 655 398 666 537 712
				C676 758 794 760 900 715
				L900 905
				L124 905
				Z" fill="url(#lowerGrad)"/>
		</g>
		<circle cx="512" cy="512" r="384" stroke="#EAF1FF" stroke-opacity="0.58" stroke-width="6"/>
	</g>
</svg>
